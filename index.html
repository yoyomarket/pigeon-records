<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>賽鴿飛行記錄系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --sky-deep: #0A1628;
    --sky-mid: #0F2044;
    --sky-light: #1A3060;
    --gold: #F5C842;
    --gold-dim: #B8942F;
    --green: #2ECC71;
    --red: #E74C3C;
    --orange: #F39C12;
    --text: #E8EFF8;
    --text-muted: #8899BB;
    --border: #1E3A6E;
    --card: #0D1E3A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--sky-deep);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #0A1628 0%, #0F2044 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-icon {
    font-size: 28px;
    filter: drop-shadow(0 0 8px rgba(245,200,66,0.6));
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
  }
  header p {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    font-family: 'Share Tech Mono', monospace;
  }
  .header-time {
    margin-left: auto;
    text-align: right;
  }
  #clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    color: var(--gold);
  }
  #date-display {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── Nav Tabs ── */
  .tabs {
    display: flex;
    background: var(--sky-mid);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    font-weight: 500;
  }
  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
    background: rgba(245,200,66,0.06);
  }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── Pages ── */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* ── Section Title ── */
  .section-title {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 12px;
    padding-left: 2px;
  }

  /* ── Pigeon Cards ── */
  .pigeon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .pigeon-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .pigeon-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .pigeon-card.status-home::before { background: var(--green); }
  .pigeon-card.status-flying::before { background: var(--gold); }
  .pigeon-card.status-late::before { background: var(--red); }
  .pigeon-card.status-ready::before { background: var(--text-muted); }

  .pigeon-card:hover {
    border-color: var(--gold);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(245,200,66,0.1);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-home .status-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-flying .status-dot { background: var(--gold); box-shadow: 0 0 6px var(--gold); animation: pulse 1.5s infinite; }
  .status-late .status-dot { background: var(--red); box-shadow: 0 0 6px var(--red); animation: pulse 1s infinite; }
  .status-ready .status-dot { background: var(--text-muted); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .ring-number {
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .status-badge {
    margin-left: auto;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .status-home .status-badge { background: rgba(46,204,113,0.15); color: var(--green); }
  .status-flying .status-badge { background: rgba(245,200,66,0.15); color: var(--gold); }
  .status-late .status-badge { background: rgba(231,76,60,0.2); color: var(--red); }
  .status-ready .status-badge { background: rgba(136,153,187,0.15); color: var(--text-muted); }

  .card-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .info-item label {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 2px;
    letter-spacing: 0.5px;
  }
  .info-item span {
    font-size: 13px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
  }
  .info-item span.highlight { color: var(--gold); }

  /* ── Release Section ── */
  .release-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .release-card h3 {
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Form Elements ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--sky-mid);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--gold);
  }
  .form-group input::placeholder { color: var(--text-muted); }
  .form-group select option { background: var(--sky-mid); }

  /* ── Buttons ── */
  .btn {
    padding: 10px 20px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--sky-deep);
  }
  .btn-primary:hover { background: #ffd84d; transform: translateY(-1px); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger {
    background: rgba(231,76,60,0.15);
    color: var(--red);
    border: 1px solid rgba(231,76,60,0.3);
  }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  /* ── Pigeon Selector in form ── */
  .pigeon-checkboxes {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .pigeon-check {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--sky-mid);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    transition: all 0.2s;
  }
  .pigeon-check:hover { border-color: var(--gold); }
  .pigeon-check input { display: none; }
  .pigeon-check.checked {
    border-color: var(--gold);
    background: rgba(245,200,66,0.12);
    color: var(--gold);
  }

  /* ── History List ── */
  .history-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .history-icon {
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .history-content { flex: 1; }
  .history-content h4 {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 5px;
  }
  .history-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .history-meta span {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
  }
  .history-meta span b {
    color: var(--text);
    font-weight: 500;
  }
  .late-tag {
    background: rgba(231,76,60,0.15);
    color: var(--red);
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 8px;
    margin-left: 6px;
  }
  .normal-tag {
    background: rgba(46,204,113,0.12);
    color: var(--green);
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 8px;
    margin-left: 6px;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--sky-mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .modal-header h3 {
    font-size: 15px;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
  }

  /* ── Stats Bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .stat-box .num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--gold);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-box .lbl {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  /* ── Flight Progress ── */
  .flight-bar {
    background: var(--sky-light);
    height: 6px;
    border-radius: 3px;
    margin-top: 10px;
    overflow: hidden;
  }
  .flight-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s;
  }
  .flight-fill.green { background: var(--green); }
  .flight-fill.gold { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
  .flight-fill.red { background: var(--red); }

  /* ── Route Tags ── */
  .route-display {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .route-point {
    font-size: 11px;
    background: var(--sky-light);
    border-radius: 4px;
    padding: 2px 7px;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
  }
  .route-arrow { color: var(--gold); font-size: 10px; }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 13px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--sky-deep); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🕊️</div>
  <div>
    <h1>賽鴿飛行記錄</h1>
    <p>RACING PIGEON FLIGHT LOG</p>
  </div>
  <div class="header-time">
    <div id="clock">--:--:--</div>
    <div id="date-display">--</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')">📊 總覽</div>
  <div class="tab" onclick="switchTab('release')">🚀 放鴿記錄</div>
  <div class="tab" onclick="switchTab('return')">🏠 歸巢記錄</div>
  <div class="tab" onclick="switchTab('history')">📋 歷史記錄</div>
</div>

<!-- ═══ PAGE: DASHBOARD ═══ -->
<div id="page-dashboard" class="page active">
  <div class="stats-bar">
    <div class="stat-box">
      <div class="num" id="stat-total">5</div>
      <div class="lbl">鴿子總數</div>
    </div>
    <div class="stat-box">
      <div class="num" id="stat-flying" style="color:var(--gold)">0</div>
      <div class="lbl">飛行中</div>
    </div>
    <div class="stat-box">
      <div class="num" id="stat-home" style="color:var(--green)">5</div>
      <div class="lbl">已歸巢</div>
    </div>
    <div class="stat-box">
      <div class="num" id="stat-late" style="color:var(--red)">0</div>
      <div class="lbl">遲歸</div>
    </div>
  </div>

  <div class="section-title">我的鴿子狀態</div>
  <div class="pigeon-grid" id="pigeon-grid"></div>
</div>

<!-- ═══ PAGE: RELEASE ═══ -->
<div id="page-release" class="page">
  <div class="release-card">
    <h3>🚀 新增放鴿記錄</h3>
    <div class="form-grid">
      <div class="form-group full">
        <label>放鴿地點</label>
        <input type="text" id="release-location" placeholder="例：彰化田中、台中神岡">
      </div>
      <div class="form-group">
        <label>放鴿日期</label>
        <input type="date" id="release-date">
      </div>
      <div class="form-group">
        <label>放鴿時間</label>
        <input type="time" id="release-time">
      </div>
      <div class="form-group full">
        <label>預計飛行距離（公里）</label>
        <input type="number" id="release-distance" placeholder="例：120">
      </div>
      <div class="form-group full">
        <label>參賽鴿子</label>
        <div class="pigeon-checkboxes" id="release-pigeon-checks"></div>
      </div>
      <div class="form-group full">
        <label>備註</label>
        <input type="text" id="release-note" placeholder="天氣、風向等備註">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addRelease()">📌 記錄放鴿</button>
      <button class="btn btn-outline" onclick="fillNow('release')">⏱ 填入現在時間</button>
    </div>
  </div>

  <div class="section-title">放鴿記錄列表</div>
  <div id="release-list"></div>
</div>

<!-- ═══ PAGE: RETURN ═══ -->
<div id="page-return" class="page">
  <div class="release-card">
    <h3>🏠 記錄鴿子歸巢</h3>
    <div class="form-grid">
      <div class="form-group full">
        <label>選擇鴿子</label>
        <select id="return-pigeon">
          <option value="">-- 選擇環號 --</option>
        </select>
      </div>
      <div class="form-group">
        <label>歸巢日期</label>
        <input type="date" id="return-date">
      </div>
      <div class="form-group">
        <label>歸巢時間</label>
        <input type="time" id="return-time">
      </div>
      <div class="form-group full">
        <label>歸巢狀態</label>
        <select id="return-status">
          <option value="normal">正常歸巢 ✅</option>
          <option value="late">遲歸 ⚠️</option>
        </select>
      </div>
      <div class="form-group full">
        <label>備註（傷況、異常等）</label>
        <input type="text" id="return-note" placeholder="例：翅膀輕微擦傷、精神良好">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addReturn()">✅ 記錄歸巢</button>
      <button class="btn btn-outline" onclick="fillNow('return')">⏱ 填入現在時間</button>
    </div>
  </div>

  <div class="section-title">今日飛行中</div>
  <div id="flying-list"></div>
</div>

<!-- ═══ PAGE: HISTORY ═══ -->
<div id="page-history" class="page">

  <!-- 統計卡片 -->
  <div class="section-title">📊 近期統計總覽</div>
  <div id="stats-section" style="margin-bottom:20px"></div>

  <!-- 月份篩選 -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <div class="section-title" style="margin-bottom:0">飛行記錄</div>
    <select id="history-month-filter" onchange="renderHistory()"
      style="background:var(--sky-mid);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:5px 10px;outline:none;margin-left:auto">
      <option value="all">全部時間</option>
    </select>
  </div>
  <div id="history-list"></div>
</div>

<!-- ═══ PIGEON DETAIL MODAL ═══ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>🕊️ <span id="modal-title">鴿子詳情</span></h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ═══ DATA ═══
const PIGEONS = [
  { ring: '91', fullRing: '24-91', color: '#F5C842' },
  { ring: '95', fullRing: '24-95', color: '#2ECC71' },
  { ring: '96', fullRing: '24-96', color: '#3498DB' },
  { ring: '98', fullRing: '24-98', color: '#E74C3C' },
  { ring: '10', fullRing: '24-10', color: '#9B59B6' },
];

let releases = JSON.parse(localStorage.getItem('releases') || '[]');
let returns  = JSON.parse(localStorage.getItem('returns') || '[]');

function save() {
  localStorage.setItem('releases', JSON.stringify(releases));
  localStorage.setItem('returns',  JSON.stringify(returns));
}

// ═══ CLOCK ═══
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
  const opts = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
  document.getElementById('date-display').textContent = now.toLocaleDateString('zh-TW', opts);
}
setInterval(updateClock, 1000);
updateClock();

// ═══ TABS ═══
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['dashboard','release','return','history'][i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'release')   renderReleasePage();
  if (tab === 'return')    renderReturnPage();
  if (tab === 'history')   renderHistory();
}

// ═══ PIGEON STATUS ═══
function getPigeonStatus(ring) {
  const released = releases.filter(r => r.pigeons.includes(ring));
  if (released.length === 0) return 'ready';
  const lastRelease = released[released.length - 1];
  const ret = returns.find(r => r.ring === ring && r.releaseId === lastRelease.id);
  if (!ret) return 'flying';
  return ret.status === 'late' ? 'late' : 'home';
}

function getStatusText(s) {
  return { ready: '待放', flying: '飛行中', home: '已歸巢', late: '遲歸' }[s];
}

function getLastFlight(ring) {
  const rels = releases.filter(r => r.pigeons.includes(ring));
  return rels.length ? rels[rels.length - 1] : null;
}

function getReturn(ring, releaseId) {
  return returns.find(r => r.ring === ring && r.releaseId === releaseId);
}

function calcFlightTime(releaseTime, returnTime) {
  const diff = new Date(returnTime) - new Date(releaseTime);
  if (diff <= 0) return '--';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return `${h}h ${m}m ${s}s`;
}

function calcSpeed(distKm, releaseTime, returnTime) {
  const diff = (new Date(returnTime) - new Date(releaseTime)) / 1000 / 60; // minutes
  if (diff <= 0 || !distKm) return '--';
  const speed = (distKm * 1000) / diff; // m/min
  return Math.round(speed) + ' m/分';
}

// ═══ DASHBOARD ═══
function renderDashboard() {
  const statuses = PIGEONS.map(p => getPigeonStatus(p.ring));
  document.getElementById('stat-flying').textContent = statuses.filter(s => s === 'flying').length;
  document.getElementById('stat-home').textContent   = statuses.filter(s => s === 'home' || s === 'ready').length;
  document.getElementById('stat-late').textContent   = statuses.filter(s => s === 'late').length;

  const grid = document.getElementById('pigeon-grid');
  grid.innerHTML = PIGEONS.map(p => {
    const status = getPigeonStatus(p.ring);
    const lastFlight = getLastFlight(p.ring);
    const ret = lastFlight ? getReturn(p.ring, lastFlight.id) : null;

    let flightTime = '--', speed = '--', location = '--';
    if (lastFlight) {
      location = lastFlight.location;
      if (ret) {
        flightTime = calcFlightTime(lastFlight.datetime, ret.datetime);
        speed = calcSpeed(lastFlight.distance, lastFlight.datetime, ret.datetime);
      }
    }

    const progress = status === 'home' ? 100 : status === 'flying' ? 60 : status === 'late' ? 90 : 0;
    const fillClass = status === 'home' ? 'green' : status === 'flying' ? 'gold' : status === 'late' ? 'red' : 'green';

    return `
    <div class="pigeon-card status-${status}" onclick="showPigeonDetail('${p.ring}')">
      <div class="card-header">
        <div class="status-dot"></div>
        <div>
          <div class="ring-number">環號 ${p.ring}</div>
          <div style="font-size:10px;color:var(--text-muted);font-family:'Share Tech Mono',monospace">${p.fullRing}</div>
        </div>
        <span class="status-badge">${getStatusText(status)}</span>
      </div>
      <div class="card-info">
        <div class="info-item">
          <label>📍 放鴿地點</label>
          <span>${location}</span>
        </div>
        <div class="info-item">
          <label>⏱ 飛行時間</label>
          <span class="highlight">${flightTime}</span>
        </div>
        <div class="info-item">
          <label>🚀 分速</label>
          <span class="highlight">${speed}</span>
        </div>
      </div>
      ${status !== 'ready' ? `<div class="flight-bar"><div class="flight-fill ${fillClass}" style="width:${progress}%"></div></div>` : ''}
    </div>`;
  }).join('');
}

// ═══ RELEASE PAGE ═══
function renderReleasePage() {

  container.innerHTML = PIGEONS.map(p => `

function toggleCheck(ring) {
  const el = document.getElementById('check-' + ring);
  el.classList.toggle('checked');
}

function getCheckedPigeons() {
  return PIGEONS.map(p => p.ring).filter(r => document.getElementById('check-' + r)?.classList.contains('checked'));
}

function addRelease() {
  const loc  = document.getElementById('release-location').value.trim();
  const date = document.getElementById('release-date').value;
  const time = document.getElementById('release-time').value;
  const dist = document.getElementById('release-distance').value;
  const note = document.getElementById('release-note').value.trim();
  const pigeons = getCheckedPigeons();

  if (!loc || !date || !time) { alert('請填入放鴿地點、日期、時間'); return; }
  if (pigeons.length === 0) { alert('請選擇至少一隻鴿子'); return; }

  const r = {
    id: Date.now().toString(),
    location: loc,
    date, time,
    datetime: date + 'T' + time,
    distance: dist ? Number(dist) : null,
    note,
    pigeons
  };
  releases.push(r);
  save();
  renderReleasePage();
  renderDashboard();

  // Clear
  ['release-location','release-distance','release-note'].forEach(id => document.getElementById(id).value = '');
  document.querySelectorAll('.pigeon-check').forEach(el => el.classList.remove('checked'));
  alert(`✅ 已記錄放鴿！\n地點：${loc}\n鴿子：${pigeons.join(', ')}`);
}

function deleteRelease(btn) {
  const id = btn.dataset.id;
  if (!id) return;
  if (!confirm('確定刪除此放鴿記錄？相關歸巢紀錄也會一併刪除。')) return;
  releases = releases.filter(r => r.id !== id);
  returns  = returns.filter(r => r.releaseId !== id);
  save();
  renderReleasePage();
  renderDashboard();
}

// ═══ RETURN PAGE ═══
function renderReturnPage() {
  const sel = document.getElementById('return-pigeon');
  sel.innerHTML = '<option value="">-- 選擇環號 --</option>' +
    PIGEONS.map(p => `<option value="${p.ring}">環號 ${p.ring} (${p.fullRing})</option>`).join('');

  // Flying list
  const flyingEl = document.getElementById('flying-list');
  const flying = PIGEONS.filter(p => getPigeonStatus(p.ring) === 'flying');
  if (flying.length === 0) {
    flyingEl.innerHTML = `<div class="empty-state"><div class="icon">😴</div><p>目前沒有鴿子在飛行中</p></div>`;
    return;
  }
  flyingEl.innerHTML = flying.map(p => {
    const lastFlight = getLastFlight(p.ring);
    return `
    <div class="history-item">
      <div class="history-icon" style="animation:pulse 1.5s infinite">🕊️</div>
      <div class="history-content">
        <h4 style="color:var(--gold)">環號 ${p.ring}</h4>
        <div class="history-meta">
          <span>🚀 從 <b>${lastFlight?.location || '--'}</b></span>
          <span>📅 <b>${lastFlight?.date || '--'}</b></span>
          <span>⏰ <b>${lastFlight?.time || '--'}</b></span>
        </div>
      </div>
      <button class="btn btn-primary" style="font-size:12px;padding:6px 12px" onclick="quickReturn('${p.ring}')">記錄歸巢</button>
    </div>`;
  }).join('');
}

function quickReturn(ring) {
  document.getElementById('return-pigeon').value = ring;
  const now = new Date();
  document.getElementById('return-date').value = now.toISOString().split('T')[0];
  document.getElementById('return-time').value = now.toTimeString().slice(0, 5);
  document.getElementById('page-return').scrollTo({ top: 0, behavior: 'smooth' });
}

function addReturn() {
  const ring   = document.getElementById('return-pigeon').value;
  const date   = document.getElementById('return-date').value;
  const time   = document.getElementById('return-time').value;
  const status = document.getElementById('return-status').value;
  const note   = document.getElementById('return-note').value.trim();

  if (!ring || !date || !time) { alert('請填入鴿子環號、日期、時間'); return; }

  const lastFlight = getLastFlight(ring);
  if (!lastFlight) { alert('找不到此鴿子的放鴿記錄'); return; }

  const existing = getReturn(ring, lastFlight.id);
  if (existing) { alert('此鴿子已記錄歸巢'); return; }

  const ft = calcFlightTime(lastFlight.datetime, date + 'T' + time);
  const sp = calcSpeed(lastFlight.distance, lastFlight.datetime, date + 'T' + time);

  returns.push({
    id: Date.now().toString(),
    ring, date, time,
    datetime: date + 'T' + time,
    releaseId: lastFlight.id,
    status, note
  });
  save();
  renderReturnPage();
  renderDashboard();

  document.getElementById('return-pigeon').value = '';
  document.getElementById('return-note').value = '';

  const msg = status === 'late' ? '⚠️ 遲歸記錄已儲存' : '✅ 正常歸巢！';
  alert(`${msg}\n環號 ${ring}\n飛行時間：${ft}\n分速：${sp}`);
}

// ═══ HISTORY ═══
function getMonthKey(dateStr) {
  return dateStr ? dateStr.slice(0, 7) : ''; // "2024-06"
}

function populateMonthFilter() {
  const sel = document.getElementById('history-month-filter');
  if (!sel) return;
  const months = [...new Set(releases.map(r => getMonthKey(r.date)))].filter(Boolean).sort().reverse();
  const cur = sel.value;
  sel.innerHTML = '<option value="all">全部時間</option>' +
    months.map(m => `<option value="${m}" ${cur===m?'selected':''}>${m.replace('-','年')}月</option>`).join('');
}

function renderStatsSection() {
  const statsEl = document.getElementById('stats-section');
  if (!statsEl) return;

  // 每隻鴿子統計
  const pigeonStats = PIGEONS.map(p => {
    const myReleases = releases.filter(r => r.pigeons.includes(p.ring));
    const myReturns  = myReleases.map(r => getReturn(p.ring, r.id)).filter(Boolean);
    const lateCount  = myReturns.filter(r => r.status === 'late').length;
    const total      = myReleases.length;
    const finished   = myReturns.length;
    const lateRate   = finished > 0 ? Math.round(lateCount / finished * 100) : null;

    // 排名：每場比賽中，依歸巢時間排序（同場賽只比同批放出的鴿子）
    let rankSum = 0, rankCount = 0;
    myReleases.forEach(rel => {
      const ret = getReturn(p.ring, rel.id);
      if (!ret) return;
      // 同場其他鴿子歸巢時間
      const competitors = rel.pigeons
        .map(r2 => ({ ring: r2, ret: getReturn(r2, rel.id) }))
        .filter(x => x.ret)
        .sort((a, b) => new Date(a.ret.datetime) - new Date(b.ret.datetime));
      const rank = competitors.findIndex(x => x.ring === p.ring) + 1;
      if (rank > 0) { rankSum += rank; rankCount++; }
    });
    const avgRank = rankCount > 0 ? (rankSum / rankCount).toFixed(1) : null;

    // 最佳分速
    let bestSpeed = null;
    myReleases.forEach(rel => {
      if (!rel.distance) return;
      const ret = getReturn(p.ring, rel.id);
      if (!ret) return;
      const diff = (new Date(ret.datetime) - new Date(rel.datetime)) / 60000;
      if (diff > 0) {
        const sp = Math.round(rel.distance * 1000 / diff);
        if (!bestSpeed || sp > bestSpeed) bestSpeed = sp;
      }
    });

    return { ...p, total, finished, lateCount, lateRate, avgRank, bestSpeed };
  });

  // 排名榜：依平均排名升序
  const ranked = [...pigeonStats]
    .filter(p => p.avgRank !== null)
    .sort((a, b) => parseFloat(a.avgRank) - parseFloat(b.avgRank));

  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];

  statsEl.innerHTML = `
  <!-- 排名榜 -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px">
    <div style="font-size:12px;color:var(--gold);letter-spacing:1px;margin-bottom:12px;font-family:'Share Tech Mono',monospace">🏆 到鴿舍排名 (依平均名次)</div>
    ${ranked.length === 0
      ? `<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:10px">尚無足夠數據</div>`
      : ranked.map((p, i) => `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;${i<ranked.length-1?'border-bottom:1px solid var(--border)':''}">
        <span style="font-size:18px;width:28px;text-align:center">${medals[i]||'—'}</span>
        <div style="flex:1">
          <span style="font-family:'Share Tech Mono',monospace;color:var(--gold);font-size:14px">環號 ${p.ring}</span>
          <div style="margin-top:4px">
            <div style="background:var(--sky-light);height:5px;border-radius:3px;overflow:hidden">
              <div style="height:100%;border-radius:3px;background:${i===0?'var(--gold)':i===1?'#aaa':i===2?'#cd7f32':'var(--sky-light)'};width:${Math.max(10,100 - (parseFloat(p.avgRank)-1)*18)}%"></div>
            </div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Share Tech Mono',monospace;font-size:15px;color:var(--text)">平均第 <b style="color:var(--gold)">${p.avgRank}</b> 名</div>
          <div style="font-size:10px;color:var(--text-muted)">${p.finished} 場有效記錄</div>
        </div>
      </div>`).join('')}
  </div>

  <!-- 遲歸率 -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px">
    <div style="font-size:12px;color:var(--gold);letter-spacing:1px;margin-bottom:12px;font-family:'Share Tech Mono',monospace">⚠️ 各鴿遲歸率</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">
      ${pigeonStats.map(p => {
        const rate = p.lateRate;
        const color = rate === null ? 'var(--text-muted)' : rate === 0 ? 'var(--green)' : rate < 30 ? 'var(--gold)' : 'var(--red)';
        return `
        <div style="background:var(--sky-mid);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center">
          <div style="font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text-muted);margin-bottom:6px">環號 ${p.ring}</div>
          <div style="font-size:26px;font-weight:700;color:${color};font-family:'Share Tech Mono',monospace;line-height:1">
            ${rate === null ? '--' : rate + '%'}
          </div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:4px">${p.lateCount}次遲歸 / ${p.finished}場</div>
          <div style="background:var(--sky-light);height:4px;border-radius:2px;margin-top:8px;overflow:hidden">
            <div style="height:100%;border-radius:2px;background:${color};width:${rate ?? 0}%"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- 最佳分速 -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:4px">
    <div style="font-size:12px;color:var(--gold);letter-spacing:1px;margin-bottom:12px;font-family:'Share Tech Mono',monospace">🚀 個人最佳分速</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">
      ${pigeonStats.map(p => `
        <div style="background:var(--sky-mid);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center">
          <div style="font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text-muted);margin-bottom:4px">環號 ${p.ring}</div>
          <div style="font-size:18px;font-weight:700;color:var(--green);font-family:'Share Tech Mono',monospace">
            ${p.bestSpeed ? p.bestSpeed + '<span style="font-size:10px;color:var(--text-muted)"> m/分</span>' : '--'}
          </div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px">${p.total} 場出賽</div>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderHistory() {
  populateMonthFilter();
  renderStatsSection();

  const listEl = document.getElementById('history-list');
  const monthFilter = document.getElementById('history-month-filter')?.value || 'all';

  if (releases.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>尚無飛行歷史</p></div>`;
    return;
  }

  const filtered = [...releases].reverse().filter(r =>
    monthFilter === 'all' || getMonthKey(r.date) === monthFilter
  );

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>此月份無記錄</p></div>`;
    return;
  }

  let html = '';
  filtered.forEach(rel => {
    rel.pigeons.forEach(ring => {
      const ret = getReturn(ring, rel.id);
      const ft = ret ? calcFlightTime(rel.datetime, ret.datetime) : '--';
      const sp = ret ? calcSpeed(rel.distance, rel.datetime, ret.datetime) : '--';
      const isLate = ret?.status === 'late';
      const tag = ret ? (isLate ? `<span class="late-tag">遲歸</span>` : `<span class="normal-tag">正常</span>`) : `<span style="color:var(--gold);font-size:10px">飛行中</span>`;

      // 同場排名
      let rankTag = '';
      if (ret) {
        const competitors = rel.pigeons
          .map(r2 => ({ ring: r2, ret: getReturn(r2, rel.id) }))
          .filter(x => x.ret)
          .sort((a, b) => new Date(a.ret.datetime) - new Date(b.ret.datetime));
        const rank = competitors.findIndex(x => x.ring === ring) + 1;
        if (rank > 0) rankTag = `<span style="background:rgba(245,200,66,0.15);color:var(--gold);font-size:10px;padding:1px 7px;border-radius:8px;margin-left:4px">本場第${rank}名</span>`;
      }

      html += `
      <div class="history-item">
        <div class="history-icon">${ret ? (isLate ? '⚠️' : '✅') : '🕊️'}</div>
        <div class="history-content">
          <h4>環號 ${ring} ${tag}${rankTag}</h4>
          <div class="history-meta" style="margin-top:6px">
            <span>🚀 放鴿 <b>${rel.date} ${rel.time}</b></span>
            ${ret ? `<span>🏠 歸巢 <b>${ret.date} ${ret.time}</b></span>` : ''}
          </div>
          <div class="history-meta">
            <span>📍 <b>${rel.location}</b></span>
            ${rel.distance ? `<span>📏 <b>${rel.distance} km</b></span>` : ''}
            <span>⏱ <b>${ft}</b></span>
            ${sp !== '--' ? `<span>🚀 <b>${sp}</b></span>` : ''}
          </div>
          ${ret?.note ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px">📝 ${ret.note}</div>` : ''}
        </div>
      </div>`;
    });
  });
  listEl.innerHTML = html;
}

// ═══ DETAIL MODAL ═══
function showPigeonDetail(ring) {
  const p = PIGEONS.find(x => x.ring === ring);
  const status = getPigeonStatus(ring);
  const flightHistory = releases.filter(r => r.pigeons.includes(ring));

  document.getElementById('modal-title').textContent = `環號 ${ring} (${p.fullRing})`;

  let html = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div class="status-dot" style="background:${status==='home'?'var(--green)':status==='flying'?'var(--gold)':status==='late'?'var(--red)':'var(--text-muted)'};box-shadow:0 0 8px currentColor;width:12px;height:12px;border-radius:50%"></div>
      <span style="font-size:14px">${getStatusText(status)}</span>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;letter-spacing:1px">FLIGHT HISTORY</div>`;

  if (flightHistory.length === 0) {
    html += `<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">尚無飛行記錄</div>`;
  } else {
    flightHistory.reverse().forEach((rel, i) => {
      const ret = getReturn(ring, rel.id);
      const ft = ret ? calcFlightTime(rel.datetime, ret.datetime) : '飛行中';
      const sp = ret ? calcSpeed(rel.distance, rel.datetime, ret.datetime) : '--';
      html += `
      <div style="background:var(--sky-deep);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:12px;color:var(--gold);font-family:'Share Tech Mono',monospace">#${flightHistory.length - i}</span>
          ${ret ? (ret.status === 'late' ? '<span class="late-tag">遲歸</span>' : '<span class="normal-tag">正常</span>') : '<span style="color:var(--gold);font-size:10px">飛行中</span>'}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <div><div style="font-size:10px;color:var(--text-muted)">放鴿地點</div><div style="font-size:12px">${rel.location}</div></div>
          <div><div style="font-size:10px;color:var(--text-muted)">放鴿時間</div><div style="font-size:12px;font-family:'Share Tech Mono',monospace">${rel.date} ${rel.time}</div></div>
          ${ret ? `<div><div style="font-size:10px;color:var(--text-muted)">歸巢時間</div><div style="font-size:12px;font-family:'Share Tech Mono',monospace">${ret.date} ${ret.time}</div></div>` : ''}
          <div><div style="font-size:10px;color:var(--text-muted)">飛行時間</div><div style="font-size:12px;color:var(--gold);font-family:'Share Tech Mono',monospace">${ft}</div></div>
          ${sp !== '--' ? `<div><div style="font-size:10px;color:var(--text-muted)">分速</div><div style="font-size:12px;color:var(--green);font-family:'Share Tech Mono',monospace">${sp}</div></div>` : ''}
          ${rel.distance ? `<div><div style="font-size:10px;color:var(--text-muted)">距離</div><div style="font-size:12px;font-family:'Share Tech Mono',monospace">${rel.distance} km</div></div>` : ''}
        </div>
      </div>`;
    });
  }

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ═══ UTILS ═══
function fillNow(type) {
  const now = new Date();
  const d = now.toISOString().split('T')[0];
  const t = now.toTimeString().slice(0, 5);
  if (type === 'release') {
    document.getElementById('release-date').value = d;
    document.getElementById('release-time').value = t;
  } else {
    document.getElementById('return-date').value = d;
    document.getElementById('return-time').value = t;
  }
}

// ═══ INIT ═══
renderDashboard();
</script>
